include:
  - compose.core.yml
name: FinanzQuest

services:
  gateway:
    networks:
      - postgres
    ports:
      - 80:80
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      auth:
        condition: service_healthy
      rest:
        condition: service_started
      frontend:
        condition: service_healthy  # you have a healthcheck defined so use it
  frontend:
    container_name: frontend
    networks:
      - postgres
    restart: unless-stopped
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://0.0.0.0:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    build:
      context: ./frontend
      dockerfile: ./Dockerfile
      target: dev
      args:
        - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_healthy
      rest:
        condition: service_started
    environment:
      API_URL_SERVER: http://gateway:80 # 8080 outside, 80 internally
      API_URL_CLIENT: http://162.55.52.117 # 8080 outside, 80 internally
      JWT_SECRET: $JWT_SECRET

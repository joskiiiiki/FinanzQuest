services:
  db:
    container_name: postgres
    image: timescale/timescaledb:2.26.0-pg17
    environment:
      POSTGRES_USER: postgres
      PGDATA: /data/postgres
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      AUTH_ADMIN_PASSWORD: ${AUTH_ADMIN_PASSWORD}
      AUTHENTICATOR_PASSWORD: ${AUTHENTICATOR_PASSWORD}
      SERVICE_WORKER_PASSWORD: ${SERVICE_WORKER_PASSWORD}
    volumes:
      - postgres:/data/postgres
      - ./dbinit/init.sh:/docker-entrypoint-initdb.d/00_init.sh
      - ./dbinit/init.sql:/init/01_init.sql
      - ./dbinit/functions.sql:/docker-entrypoint-initdb.d/02_functions.sql
      - ./dbinit/stocks.sql:/docker-entrypoint-initdb.d/03_stocks.sql
      - ./dbinit/assets.csv:/docker-entrypoint-initdb.d/data/assets.csv
    ports:
      - 0.0.0.0:5432:5432
    networks:
      - postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth:
    container_name: auth_container
    image: supabase/auth:v2.177.0
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_API_HOST: 0.0.0.0
      API_EXTERNAL_URL: http://localhost:8081
      PORT: 9999
      DB_NAMESPACE: auth
      GOTRUE_LOG_LEVEL: debug
      GOTRUE_DB_DRIVER: postgres
      DATABASE_URL: postgresql://auth_admin:${AUTH_ADMIN_PASSWORD}@db:5432/postgres?sslmode=disable
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_MAILER_AUTOCONFIRM: true
      GOTRUE_DISABLE_SIGNUP: false
      GOTRUE_EXTERNAL_EMAIL_ENABLED: true
      GOTRUE_EXTERNAL_PHONE_ENABLED: false
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:9999/health",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - postgres

  rest:
    container_name: rest
    image: postgrest/postgrest:v13.0.4
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      PGRST_DB_POOL: 20
      PGRST_DB_SCHEMAS: "api,depots,users"
      PGRST_DB_URI: postgres://authenticator:${AUTHENTICATOR_PASSWORD}@db:5432/postgres
      PGRST_OPENAPI_SERVER_PROXY_URI: http://127.0.0.1:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_SERVER_CORS_ALLOWED_ORIGINS: ""
    restart: unless-stopped
    networks:
      - postgres

  gateway:
    container_name: gateway
    image: nginx:1.29.0-alpine
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - 8080:80
    depends_on:
      auth:
        condition: service_healthy
      rest:
        condition: service_started
    networks:
      - postgres

  updater:
    container_name: updater
    build:
      context: ./updater
      dockerfile: ./dockerfile
      network: "host"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://service_worker:${SERVICE_WORKER_PASSWORD}@db:5432/postgres
      YF_TIMEOUT: 2
      UPDATE_IMMEDIATE: false
    restart: unless-stopped
    networks:
      - postgres

  db-init:
    image: postgres:17-alpine
    container_name: db-init
    depends_on:
      auth:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: postgres
    volumes:
      - ./dbinit/permissions.sql:/permissions.sql
      - ./dbinit/postauth.sql:/postauth.sql
      - ./dbinit/admin.sql:/admin.sql
    networks:
      - postgres
    command: >
      sh -c "
        echo 'Running post-auth initialization...'
        psql -f /permissions.sql
        psql -f /postauth.sql
        psql -f /admin.sql
        echo 'Post-auth initialization complete!'
      "

networks:
  postgres:
    driver: bridge

volumes:
  postgres:
